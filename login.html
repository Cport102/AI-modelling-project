<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTGPT</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fffdf9;
      --text: #1f1a17;
      --muted: #6b625b;
      --accent: #d97757;
      --accent-hover: #c4683f;
      --border: #e8ded4;
      --error-bg: #fff1ef;
      --error-text: #b42318;
      --shadow: 0 18px 40px rgba(35, 25, 16, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(217, 119, 87, 0.16), transparent 36%),
        linear-gradient(160deg, #f8f4ee 0%, #f1ebe2 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 1rem;
      margin-bottom: 16px;
    }

    input:focus {
      outline: 2px solid rgba(217, 119, 87, 0.25);
      border-color: var(--accent);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    #error {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 0.95rem;
    }

    #error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>DTGPT</h1>
    <p>Password protection has been removed. Redirecting back to the app.</p>
  </main>

  <script>
    const next = new URLSearchParams(window.location.search).get('next') || '/';
    window.location.replace(next);
  </script>
</body>
</html>
