<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTGPT</title>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* ─── CSS Custom Properties ─────────────────────────────────────────── */
    :root {
      --bg:            #f9f9f8;
      --surface:       #ffffff;
      --surface-hover: #f3f3f1;
      --border:        #e5e5e3;
      --text:          #1a1a1a;
      --text-muted:    #6b7280;
      --accent:        #d97757;   /* App accent */
      --accent-hover:  #c4683f;
      --user-bubble:   #f3f3f1;
      --user-text:     #1a1a1a;
      --code-bg:       #f6f6f4;
      --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --radius:        12px;
      --input-bg:      #ffffff;
      --scrollbar:     #d1d1ce;
    }

    [data-theme="dark"] {
      --bg:            #1c1c1c;
      --surface:       #262626;
      --surface-hover: #303030;
      --border:        #383838;
      --text:          #ececec;
      --text-muted:    #9ca3af;
      --user-bubble:   #303030;
      --user-text:     #ececec;
      --code-bg:       #1e1e1e;
      --input-bg:      #262626;
      --scrollbar:     #4a4a4a;
    }

    /* ─── Reset & Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      transition: background .2s, color .2s;
    }

    /* ─── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ─── Layout ────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── Header ────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* App logo mark */
    .assistant-logo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .assistant-logo svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    /* Model selector */
    #model-select {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }

    #model-select:focus { border-color: var(--accent); }

    #header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Icon buttons in header */
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
    }

    .icon-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .icon-btn svg { width: 18px; height: 18px; }

    /* ─── Chat Thread ────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Welcome / empty state */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 0;
    }

    #welcome .big-logo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    #welcome .big-logo svg { width: 30px; height: 30px; fill: #fff; }
    #welcome h2 { font-size: 20px; font-weight: 600; color: var(--text); }
    #welcome p  { font-size: 14px; max-width: 340px; }

    /* ─── Message Row ────────────────────────────────────────────────────── */
    .message-row {
      display: flex;
      gap: 12px;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* User rows are right-aligned */
    .message-row.user {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
    }

    .avatar.assistant-avatar {
      background: var(--accent);
    }

    .avatar.assistant-avatar svg { width: 18px; height: 18px; fill: #fff; }

    .avatar.user-avatar {
      background: #6366f1;
      color: #fff;
    }

    /* Bubble */
    .bubble {
      max-width: min(calc(100% - 52px), 600px);
    }

    .message-row.user .bubble {
      align-items: flex-end;
    }

    .bubble-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .message-row.user .bubble-name { text-align: right; }

    .bubble-content {
      background: var(--user-bubble);
      color: var(--user-text);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Assistant messages have no bubble background */
    .message-row.assistant .bubble-content {
      background: transparent;
      padding: 0;
    }

    /* ─── Markdown Rendering ─────────────────────────────────────────────── */
    .bubble-content.markdown {
      font-size: 14.5px;
    }

    .bubble-content.markdown p { margin: 0 0 .75em; }
    .bubble-content.markdown p:last-child { margin-bottom: 0; }

    .bubble-content.markdown h1,
    .bubble-content.markdown h2,
    .bubble-content.markdown h3,
    .bubble-content.markdown h4 {
      font-weight: 700;
      margin: 1em 0 .4em;
      line-height: 1.3;
    }

    .bubble-content.markdown h1 { font-size: 1.25em; }
    .bubble-content.markdown h2 { font-size: 1.1em; }
    .bubble-content.markdown h3 { font-size: 1em; }

    .bubble-content.markdown ul,
    .bubble-content.markdown ol {
      margin: .5em 0;
      padding-left: 1.4em;
    }

    .bubble-content.markdown li { margin: .2em 0; }

    .bubble-content.markdown a { color: var(--accent); text-decoration: none; }
    .bubble-content.markdown a:hover { text-decoration: underline; }

    .bubble-content.markdown blockquote {
      border-left: 3px solid var(--border);
      margin: .5em 0;
      padding-left: 1em;
      color: var(--text-muted);
    }

    .bubble-content.markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1em 0;
    }

    /* Inline code */
    .bubble-content.markdown code {
      font-family: "Menlo", "Consolas", "Monaco", monospace;
      font-size: 13px;
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Code block wrapper */
    .code-block-wrapper {
      margin: .75em 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--code-bg);
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: "Menlo", "Consolas", monospace;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background .15s, color .15s;
    }

    .copy-btn:hover { background: var(--surface-hover); color: var(--text); }
    .copy-btn.copied { color: #22c55e; }

    .bubble-content.markdown pre {
      margin: 0;
      padding: 14px 16px;
      background: var(--code-bg);
      overflow-x: auto;
      font-size: 13px;
    }

    .bubble-content.markdown pre code {
      background: none;
      border: none;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
    }

    /* ─── Typing Indicator ───────────────────────────────────────────────── */
    #typing-indicator {
      display: none;
      gap: 12px;
    }

    #typing-indicator.visible { display: flex; }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce .9s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);  opacity: .4; }
      40%            { transform: translateY(-5px); opacity: 1;  }
    }

    /* ─── Error Banner ───────────────────────────────────────────────────── */
    #error-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 10px 16px;
      margin: 0 20px;
      border-radius: 10px;
      font-size: 13.5px;
      flex-shrink: 0;
    }

    [data-theme="dark"] #error-banner {
      background: #3b0e0e;
      border-color: #7f1d1d;
      color: #fca5a5;
    }

    #error-banner.visible { display: flex; }
    #error-close { background: none; border: none; cursor: pointer; font-size: 18px; color: inherit; line-height: 1; padding: 0 4px; }

    /* ─── Input Bar ──────────────────────────────────────────────────────── */
    #input-area {
      padding: 12px 20px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }

    #input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px 10px 16px;
      box-shadow: var(--shadow);
      transition: border-color .15s;
    }

    #input-box:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      font-size: 14.5px;
      line-height: 1.55;
      max-height: 200px;
      overflow-y: auto;
      font-family: inherit;
    }

    #user-input::placeholder { color: var(--text-muted); }

    /* Send / Stop button */
    #send-btn, #stop-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    #stop-btn {
      display: none;
      background: var(--surface-hover);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    #stop-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }

    #stop-btn svg, #send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ─── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #app { max-width: 100%; }
      #messages { padding: 16px 14px; }
      #input-area { padding: 10px 14px 16px; }
      #header { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     MAIN APP
════════════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header id="header">
    <div id="header-left">
      <div class="assistant-logo" style="overflow:hidden;"><img src="Dan Tan.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="DTGPT" /></div>
      <h1>DTGPT</h1>
      <!-- Model selector -->
      <select id="model-select" title="Select model" aria-label="Select model">
        <option value="gemini-2.5-flash">Dan Tan Regular</option>
        <option value="gemini-2.5-pro">Dan Tan Deluxe</option>
        <option value="gemini-2.5-flash-lite">Dan Tan Mini</option>
      </select>
    </div>

    <div id="header-right">
      <button class="icon-btn" id="logout-btn" title="Log out" aria-label="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>

      <!-- New Chat -->
      <button class="icon-btn" id="new-chat-btn" title="New chat" aria-label="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>

      <!-- Dark mode toggle -->
      <button class="icon-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle dark mode">
        <!-- Sun (shown in dark mode) -->
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Messages thread -->
  <div id="messages" role="log" aria-live="polite" aria-label="Conversation">

    <!-- Welcome screen (hidden once chat starts) -->
    <div id="welcome">
      <div style="font-size:60px;font-weight:700;line-height:1;margin-bottom:8px;font-family:inherit;">
        <span style="color:var(--accent);font-weight:800;">D</span><span style="font-size:0.7em;">an</span>
        <span style="color:var(--accent);font-weight:800;">T</span><span style="font-size:0.7em;">an</span>
        <span style="color:var(--accent);font-weight:800;">GPT</span>
      </div>
      <div class="big-logo" style="overflow:hidden;"><img src="Dan Tan.png" style="width:80%;height:100%;object-fit:contain;" alt="DTGPT" /></div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything.</p>
    </div>

    <!-- Typing indicator -->
    <div id="typing-indicator" aria-label="Dan is typing" aria-hidden="true">
      <div class="avatar assistant-avatar" style="overflow:hidden;"><img src="Dan Tan.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Dan" /></div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" role="alert">
    <span id="error-msg"></span>
    <button id="error-close" aria-label="Dismiss error">×</button>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div id="input-box">
      <textarea
        id="user-input"
        placeholder="Message Dan…"
        rows="1"
        aria-label="Message input"
        autocomplete="off"
        spellcheck="true"
      ></textarea>

      <!-- Send button -->
      <button id="send-btn" disabled title="Send message (Enter)" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>

      <!-- Stop button (shown while streaming) -->
      <button id="stop-btn" title="Stop generating" aria-label="Stop generating">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let conversation  = [];   // [{role:'user'|'assistant', content:'...'}]
let abortCtrl     = null; // AbortController for current stream
let isStreaming   = false;

// API calls go to the local proxy server — key never touches the browser
const API_ENDPOINT = (window.location.protocol === 'http:' || window.location.protocol === 'https:')
  ? '/api/chat'
  : 'http://localhost:3000/api/chat';
const HEALTH_ENDPOINT = (window.location.protocol === 'http:' || window.location.protocol === 'https:')
  ? '/api/health'
  : 'http://localhost:3000/api/health';

// ═══════════════════════════════════════════════
//  DOM REFERENCES
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const messagesEl  = $('messages');
const welcomeEl   = $('welcome');
const typingEl    = $('typing-indicator');
const errorBanner = $('error-banner');
const errorMsg    = $('error-msg');
const userInput   = $('user-input');
const sendBtn     = $('send-btn');
const stopBtn     = $('stop-btn');
const modelSelect = $('model-select');
const logoutBtn   = $('logout-btn');
const newChatBtn  = $('new-chat-btn');
const themeBtn    = $('theme-btn');
const iconSun     = $('icon-sun');
const iconMoon    = $('icon-moon');

// ═══════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════
function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

let currentTheme = localStorage.getItem('dtgpt_theme') || getSystemTheme();

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('dtgpt_theme', theme);

  const isDark = theme === 'dark';
  iconSun.style.display  = isDark ? 'block' : 'none';
  iconMoon.style.display = isDark ? 'none'  : 'block';

  // Swap highlight.js stylesheet
  document.getElementById('hljs-light').disabled = isDark;
  document.getElementById('hljs-dark').disabled  = !isDark;
}

applyTheme(currentTheme);

themeBtn.addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// ═══════════════════════════════════════════════
//  MARKED.JS CONFIGURATION
// ═══════════════════════════════════════════════
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: null,  // we handle code blocks manually
});

// Custom renderer to wrap code blocks with our styled header
const renderer = new marked.Renderer();

renderer.code = function(code, language) {
  const lang    = (language || '').trim().toLowerCase();
  const validLang = lang && hljs.getLanguage(lang);
  const highlighted = validLang
    ? hljs.highlight(code, { language: lang }).value
    : hljs.highlightAuto(code).value;

  const displayLang = lang || 'plaintext';
  const id = 'code-' + Math.random().toString(36).slice(2, 9);

  return `
    <div class="code-block-wrapper">
      <div class="code-block-header">
        <span>${escapeHtml(displayLang)}</span>
        <button class="copy-btn" data-target="${id}" onclick="copyCode(this)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
      <pre><code id="${id}" class="hljs ${validLang ? `language-${lang}` : ''}">${highlighted}</code></pre>
    </div>`;
};

marked.use({ renderer });

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Copy button handler (global, called from inline onclick)
function copyCode(btn) {
  const id   = btn.dataset.target;
  const code = document.getElementById(id)?.innerText || '';
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  });
}

// ═══════════════════════════════════════════════
//  AUTO-GROW TEXTAREA
// ═══════════════════════════════════════════════
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
  sendBtn.disabled = userInput.value.trim() === '';
});

// ═══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled && !isStreaming) sendMessage();
  }
});

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function showError(msg) {
  errorMsg.textContent = msg;
  errorBanner.classList.add('visible');
}

function hideError() {
  errorBanner.classList.remove('visible');
}

function scrollToBottom(smooth = true) {
  messagesEl.scrollTo({
    top: messagesEl.scrollHeight,
    behavior: smooth ? 'smooth' : 'instant',
  });
}

function setStreaming(active) {
  isStreaming = active;
  sendBtn.style.display = active ? 'none' : 'flex';
  stopBtn.style.display = active ? 'flex' : 'none';
  userInput.disabled    = active;
  if (active) {
    typingEl.classList.add('visible');
    typingEl.setAttribute('aria-hidden', 'false');
  } else {
    typingEl.classList.remove('visible');
    typingEl.setAttribute('aria-hidden', 'true');
  }
}

async function checkBackendHealth() {
  try {
    const response = await fetch(HEALTH_ENDPOINT, { cache: 'no-store' });
    if (response.status === 401) {
      window.location.href = '/login.html';
      return false;
    }
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    hideError();
    return true;
  } catch {
    showError('Backend unavailable. Start the server with "npm start" and open http://localhost:3000/chatbot.html.');
    return false;
  }
}

// ═══════════════════════════════════════════════
//  CREATE MESSAGE DOM NODE
// ═══════════════════════════════════════════════
function createMessageRow(role) {
  const row     = document.createElement('div');
  row.className = `message-row ${role}`;

  // Avatar
  const avatar = document.createElement('div');
  if (role === 'assistant') {
    avatar.className = 'avatar assistant-avatar';
    avatar.style.cssText = 'overflow:hidden;';
    avatar.innerHTML = `<img src="Dan Tan.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Dan" />`;
  } else {
    avatar.className = 'avatar user-avatar';
    avatar.textContent = 'Y';   // "You"
  }

  // Bubble wrapper
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const name = document.createElement('div');
  name.className   = 'bubble-name';
  name.textContent = role === 'assistant' ? 'Dan' : 'You';

  const content = document.createElement('div');
  content.className = role === 'assistant' ? 'bubble-content markdown' : 'bubble-content';

  bubble.appendChild(name);
  bubble.appendChild(content);

  row.appendChild(avatar);
  row.appendChild(bubble);

  return { row, content };
}

function appendMessage(role, text) {
  // Hide welcome screen on first message
  if (welcomeEl) welcomeEl.style.display = 'none';

  const { row, content } = createMessageRow(role);

  if (role === 'assistant') {
    content.innerHTML = marked.parse(text);
  } else {
    content.textContent = text;
  }

  // Insert before typing indicator
  messagesEl.insertBefore(row, typingEl);
  scrollToBottom();
  return content;   // return for streaming updates
}

// ═══════════════════════════════════════════════
//  STREAMING API CALL
// ═══════════════════════════════════════════════
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  hideError();

  const backendReady = await checkBackendHealth();
  if (!backendReady) return;

  // Add user turn to history & DOM
  conversation.push({ role: 'user', content: text });
  appendMessage('user', text);

  // Reset input
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;

  // Prepare assistant bubble
  if (welcomeEl) welcomeEl.style.display = 'none';
  const { row, content } = createMessageRow('assistant');
  messagesEl.insertBefore(row, typingEl);

  setStreaming(true);
  scrollToBottom();

  let fullText = '';

  try {
    abortCtrl = new AbortController();

    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:    modelSelect.value,
        messages: conversation,
      }),
      signal: abortCtrl.signal,
    });

    if (!response.ok) {
      if (response.status === 401) {
        window.location.href = '/login.html';
        return;
      }
      let errBody = {};
      try { errBody = await response.json(); } catch {}
      const msg = errBody?.error?.message || `HTTP ${response.status} — ${response.statusText}`;
      throw new Error(msg);
    }

    // Read SSE stream
    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Split on double-newline SSE boundaries
      const parts = buffer.split('\n');
      buffer = parts.pop();   // keep any incomplete line

      for (const line of parts) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const data = trimmed.slice(5).trim();
        if (data === '[DONE]') break;

        let evt;
        try { evt = JSON.parse(data); } catch { continue; }

        const responses = Array.isArray(evt) ? evt : [evt];
        const chunkText = responses
          .flatMap(response => response?.candidates || [])
          .flatMap(candidate => candidate?.content?.parts || [])
          .map(part => part?.text || '')
          .join('');

        if (chunkText) {
          fullText = chunkText.startsWith(fullText) ? chunkText : fullText + chunkText;

          // Update bubble with parsed markdown
          content.innerHTML = marked.parse(fullText);

          // Hide the generic typing indicator once text starts coming in
          typingEl.classList.remove('visible');
          scrollToBottom(false);
        }

        // Handle stream errors from API
        const streamError = responses.find(response => response?.error)?.error;
        if (streamError) {
          throw new Error(streamError.message || 'Stream error');
        }
      }
    }

    // Add assistant turn to history
    conversation.push({ role: 'assistant', content: fullText });

  } catch (err) {
    if (err.name === 'AbortError') {
      // User stopped — keep whatever arrived so far
      if (fullText) {
        conversation.push({ role: 'assistant', content: fullText });
      } else {
        // Remove the empty assistant bubble
        row.remove();
        // Also remove the user turn we already pushed
        conversation.pop();
        conversation.pop();
      }
    } else {
      const msg = err.message === 'Failed to fetch'
        ? 'Could not reach the local server. Start it with "npm start" and open http://localhost:3000/chatbot.html.'
        : 'Error: ' + err.message;
      showError(msg);
      row.remove();
      // Remove last user message from history so user can retry
      conversation.pop();
    }
  } finally {
    setStreaming(false);
    abortCtrl = null;
    // Re-enable send if there's text
    sendBtn.disabled = userInput.value.trim() === '';
  }
}

// ═══════════════════════════════════════════════
//  BUTTON HANDLERS
// ═══════════════════════════════════════════════
sendBtn.addEventListener('click', sendMessage);

stopBtn.addEventListener('click', () => {
  if (abortCtrl) abortCtrl.abort();
});

logoutBtn.addEventListener('click', async () => {
  try {
    await fetch('/api/logout', { method: 'POST' });
  } finally {
    window.location.href = '/login.html';
  }
});

$('error-close').addEventListener('click', hideError);

newChatBtn.addEventListener('click', () => {
  conversation = [];
  // Remove all message rows but keep welcome & typing indicator
  [...messagesEl.children].forEach(child => {
    if (child.id !== 'welcome' && child.id !== 'typing-indicator') {
      child.remove();
    }
  });
  welcomeEl.style.display = '';
  hideError();
  userInput.focus();
});

// ═══════════════════════════════════════════════
//  INITIALISATION
// ═══════════════════════════════════════════════
userInput.focus();
checkBackendHealth();
</script>
</body>
</html>
